name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check (all .py files)
        run: python -m compileall examples/ llm-monitoring/ go-analysis/scripts/

      - name: Run minimal example
        run: python examples/minimal_cc.py

      - name: Run LLM monitoring simulation
        run: |
          cd llm-monitoring
          python simulate.py --no-show 2>/dev/null || python simulate.py
